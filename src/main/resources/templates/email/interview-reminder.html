<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Interview Reminder</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f4f5; margin: 0; padding: 0; }
        .wrapper { max-width: 560px; margin: 40px auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
        .header { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); padding: 32px; text-align: center; }
        .header h1 { color: #fff; margin: 0; font-size: 22px; font-weight: 700; }
        .header p { color: rgba(255,255,255,.8); margin: 6px 0 0; font-size: 14px; }
        .body { padding: 32px; }
        .company { font-size: 24px; font-weight: 700; color: #111827; margin: 0 0 4px; }
        .role { font-size: 16px; color: #6b7280; margin: 0 0 24px; }
        .detail-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f3f4f6; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { font-size: 12px; color: #9ca3af; text-transform: uppercase; letter-spacing: .05em; min-width: 80px; }
        .detail-value { font-size: 15px; color: #1f2937; font-weight: 500; }
        .badge { display: inline-block; background: #ede9fe; color: #6d28d9; border-radius: 20px; padding: 4px 12px; font-size: 13px; font-weight: 600; }
        .footer { background: #f9fafb; padding: 20px 32px; text-align: center; font-size: 12px; color: #9ca3af; }
        .footer a { color: #6366f1; text-decoration: none; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header">
        <h1>Interview in 24 hours</h1>
        <p>You have an upcoming interview — good luck!</p>
    </div>
    <div class="body">
        <p class="company" th:text="${company}">Company Name</p>
        <p class="role" th:text="${role}">Job Title</p>

        <div class="detail-row">
            <span class="detail-label">Type</span>
            <span class="badge" th:text="${interviewType}">TECHNICAL</span>
        </div>
        <div class="detail-row">
            <span class="detail-label">When</span>
            <span class="detail-value" th:text="${scheduledAt}">Monday, January 1 at 10:00 AM</span>
        </div>
        <div th:if="${durationMinutes}" class="detail-row">
            <span class="detail-label">Duration</span>
            <span class="detail-value" th:text="${durationMinutes} + ' minutes'">60 minutes</span>
        </div>
        <div th:if="${platform}" class="detail-row">
            <span class="detail-label">Platform</span>
            <span class="detail-value" th:text="${platform}">Google Meet</span>
        </div>
        <div th:if="${interviewerName}" class="detail-row">
            <span class="detail-label">Interviewer</span>
            <span class="detail-value" th:text="${interviewerName}">Jane Doe</span>
        </div>
    </div>
    <div class="footer">
        Sent by <a href="#">HireTrack</a> — your job search companion.
    </div>
</div>
</body>
</html>
