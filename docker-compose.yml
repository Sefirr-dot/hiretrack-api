version: '3.8'

services:
  app:
    build: .
    container_name: hiretrack-app
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: hiretrack-postgres
    environment:
      POSTGRES_DB: hiretrack
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d hiretrack"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hiretrack-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
